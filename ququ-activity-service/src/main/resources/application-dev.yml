server:
  port: 8082

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${ACTIVITY_DB_URL:jdbc:mysql://localhost:3306/ququ_activity?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${ACTIVITY_DB_USERNAME:root}
    password: ${ACTIVITY_DB_PASSWORD:ququ_root_password}

jwt:
  secret: ${JWT_SECRET:replace-with-at-least-32-bytes-dev-secret}
  access-token-expire: ${JWT_ACCESS_TOKEN_EXPIRE:7200000}
  refresh-token-expire: ${JWT_REFRESH_TOKEN_EXPIRE:604800000}

user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}

ai:
  mode: ${AI_MODE:local}
  service:
    url: ${AI_SERVICE_URL:http://localhost:8001}
  provider: ${AI_PROVIDER:mock}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:mock-planner-v1}
  mock:
    enabled: ${AI_MOCK_ENABLED:true}
