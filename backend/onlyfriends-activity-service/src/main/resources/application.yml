server:
  port: 8082

spring:
  application:
    name: onlyfriends-activity-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:${NACOS_ENABLED:false}}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${ACTIVITY_DB_URL:jdbc:mysql://localhost:3306/onlyfriends_activity?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${ACTIVITY_DB_USERNAME:root}
    password: ${ACTIVITY_DB_PASSWORD:}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-32bytes}
  access-token-expire: ${JWT_ACCESS_TOKEN_EXPIRE:7200000}
  refresh-token-expire: ${JWT_REFRESH_TOKEN_EXPIRE:604800000}

user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}

social-service:
  base-url: ${SOCIAL_SERVICE_BASE_URL:http://localhost:8083}

ai:
  mode: ${AI_MODE:local}
  service:
    url: ${AI_SERVICE_URL:http://localhost:8001}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:30}
    retry-times: ${AI_RETRY_TIMES:1}
  provider: ${AI_PROVIDER:mock}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:mock-planner-v1}
  mock:
    enabled: ${AI_MOCK_ENABLED:true}

app:
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
  ai:
    cache:
      enabled: ${AI_CACHE_ENABLED:true}
      ttl-hours: ${AI_CACHE_TTL_HOURS:24}
  checkin:
    secret: ${CHECKIN_SECRET:change-me-checkin-secret-32bytes}
  waitlist:
    pending-timeout-minutes: ${WAITLIST_PENDING_TIMEOUT_MINUTES:30}
  storage:
    type: ${STORAGE_TYPE:local}
    local-dir: ${STORAGE_LOCAL_DIR:data/uploads}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin123}
