services:
  mysql:
    image: mysql:8.0
    container_name: onlyfriends-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-onlyfriends_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-onlyfriends_user}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - onlyfriends_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: onlyfriends-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - onlyfriends_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: onlyfriends-nacos
    restart: unless-stopped
    profiles: ["infra"]
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    volumes:
      - onlyfriends_nacos_data:/home/nacos/data
      - onlyfriends_nacos_logs:/home/nacos/logs

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: onlyfriends-minio
    restart: unless-stopped
    profiles: ["infra"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    command: server /data --console-address ":9001"
    volumes:
      - onlyfriends_minio_data:/data

volumes:
  onlyfriends_mysql_data:
  onlyfriends_redis_data:
  onlyfriends_nacos_data:
  onlyfriends_nacos_logs:
  onlyfriends_minio_data:
