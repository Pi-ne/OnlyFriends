spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:onlyfriends_user_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  mail:
    host:
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: test-secret-change-me-change-me-32bytes
  access-token-expire: 7200000
  refresh-token-expire: 604800000

app:
  upload-dir: target/test-uploads
  wechat:
    mock-enabled: true
  redis:
    enabled: false
  storage:
    type: local
    local-dir: target/test-uploads
