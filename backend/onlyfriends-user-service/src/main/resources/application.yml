server:
  port: 8081

spring:
  application:
    name: onlyfriends-user-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${NACOS_CONFIG_ENABLED:${NACOS_ENABLED:false}}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${USER_DB_URL:jdbc:mysql://localhost:3306/onlyfriends_user?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${USER_DB_USERNAME:root}
    password: ${USER_DB_PASSWORD:}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2000ms}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-32bytes}
  access-token-expire: ${JWT_ACCESS_TOKEN_EXPIRE:7200000}
  refresh-token-expire: ${JWT_REFRESH_TOKEN_EXPIRE:604800000}

app:
  activation-base-url: ${ACTIVATION_BASE_URL:http://localhost:8081/api/v1/auth/activate}
  upload-dir: ${USER_UPLOAD_DIR:data/uploads}
  redis:
    enabled: ${USER_REDIS_ENABLED:false}
  storage:
    type: ${STORAGE_TYPE:local}
    local-dir: ${STORAGE_LOCAL_DIR:data/uploads}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin123}
