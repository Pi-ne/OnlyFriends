spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:ququ_im_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: test-test-test-test-test-test-32bytes
  access-token-expire: 7200000
  refresh-token-expire: 604800000

user-service:
  base-url: http://localhost:18081

social-service:
  base-url: http://localhost:18083

app:
  redis:
    enabled: false
  im:
    online-ttl-seconds: 60
